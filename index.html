<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Marketing Copilot | Agency Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --agency-primary: #3b82f6; }
        .bg-agency { background-color: var(--agency-primary); }
        .text-agency { color: var(--agency-primary); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow-sm border-b-4 border-blue-600" id="brand-border">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div id="agency-logo" class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center font-bold text-gray-500">A</div>
                <h1 id="agency-name" class="text-xl font-bold text-gray-800">Marketing Agency</h1>
            </div>
            <nav class="space-x-4 text-sm font-medium text-gray-600">
                <a href="#" class="hover:text-blue-600">Dashboard</a>
                <a href="#" class="hover:text-blue-600">Settings</a>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto py-12 px-4">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Generate New Client Report</h2>
            
            <div id="step-1" class="space-y-6">
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-10 text-center hover:border-blue-400 transition-colors">
                    <input type="file" id="ad-csv" class="hidden" accept=".csv">
                    <label for="ad-csv" class="cursor-pointer">
                        <span class="block text-lg font-medium text-gray-700">Upload Ad Performance CSV</span>
                        <span class="text-sm text-gray-500">Meta, Google, or LinkedIn export</span>
                    </label>
                </div>
                <button onclick="handleInitialUpload()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">Next: Map Columns</button>
            </div>

            <div id="step-2" class="hidden space-y-6">
                <h3 class="font-semibold text-gray-700">Map your CSV columns to our standard fields:</h3>
                <div id="mapping-area" class="grid grid-cols-2 gap-4">
                    </div>
                <button onclick="generateReport()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700">Generate AI Strategy</button>
            </div>
        </div>
    </main>

    <script>
        let headers = [];
        const API_URL = "https://your-render-app.onrender.com"; // Change to your backend URL

        async function handleInitialUpload() {
            const file = document.getElementById('ad-csv').files[0];
            if (!file) return alert("Please select a file");

            // Read the first line to get headers
            const text = await file.text();
            headers = text.split('\n')[0].split(',').map(h => h.trim());

            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');

            const mappingFields = ['Date', 'Spend', 'Conversions', 'Clicks'];
            const container = document.getElementById('mapping-area');
            
            mappingFields.forEach(field => {
                container.innerHTML += `
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">${field}</label>
                        <select id="map-${field}" class="w-full border p-2 rounded">
                            ${headers.map(h => `<option value="${h}">${h}</option>`).join('')}
                        </select>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
